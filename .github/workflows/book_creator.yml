name: Export Guidebook

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble
        run: |
          echo -e "---\ntitle: Vault Export\n---\n" > combined.md
          while IFS='|' read -r f h || [ -n "$f" ]; do
            fname=$(echo "$f" | xargs) # Clean whitespace
            if [ -f "$fname" ]; then
              echo -e "\n$h\n" >> combined.md
              # Remove YAML and append content
              sed '1{/^---$/{:a;n;/^---$/!ba;d}}' "$fname" >> combined.md
            fi
          done < manifest.txt
          # Clean wikilinks
          sed -i 's/\[\[//g; s/\]\]//g' combined.md

      - name: Pandoc
        uses: docker://pandoc/extra:3.9
        with:
          args: >
            combined.md
            -o vault_export.pdf
            --include-in-header=preamble.tex
            --toc
            --pdf-engine=pdflatex

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: export-files
          path: |
            vault_export.pdf
            combined.md
