name: Convert Vault to PDF

on:
  workflow_dispatch:

jobs:
  convert_via_pandoc:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Assemble Combined Markdown
        run: |
          mkdir -p output
          
          # 1. Start with global metadata
          if [ -f "metadata.yaml" ]; then
            cat metadata.yaml > combined.md
            echo -e "\n" >> combined.md
          else
            echo -e "---\ntitle: Documentation\n---\n" > combined.md
          fi

          # 2. Process Manifest
          while IFS='|' read -r raw_filename header_str || [ -n "$raw_filename" ]; do
            
            filename=$(echo "$raw_filename" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | tr -d '\r')
            
            if [ -n "$filename" ] && [ -f "$filename" ]; then
              echo "Adding: $filename"
              
              # Add the header
              echo -e "\n$header_str\n" >> combined.md
              
              # UNIQUE FOOTNOTE FIX:
              # Generates a short unique ID based on the filename (e.g., 'abc12')
              # Replaces [^1] with [^1-abc12] so footnotes don't collide.
              FILE_ID=$(echo "$filename" | md5sum | cut -c1-5)
              
              # Wrap Cutouts in LaTeX environments if folder matches
              if [[ "$filename" == *"Cutouts"* ]]; then
                 echo -e "\n\begin{cutoutbox}" >> combined.md
              fi

              # Strip frontmatter, sanitize horizontal rules, and uniquify footnotes
              perl -0777 -pe 's/^---\s*.*?\n---\s*\n//s' "$filename" | \
              sed "s/^---/***/" | \
              sed -r "s/\[\^([0-9]+)\]/[^\1-$FILE_ID]/g" >> combined.md
              
              if [[ "$filename" == *"Cutouts"* ]]; then
                 echo -e "\end{cutoutbox}\n" >> combined.md
              fi

              echo -e "\n" >> combined.md
            fi
          done < manifest.txt

          # 3. Final cleanup: Remove Wikilinks
          sed -i 's/\[\[//g; s/\]\]//g' combined.md

      - name: Run Pandoc
        # Switched to the -full image to ensure titlesec and tcolorbox are present
        uses: docker://pandoc/latex:3.8-full
        with:
          args: >
            combined.md
            --output=output/vault_export.pdf
            --include-in-header=preamble.tex
            --toc
            --toc-depth=1
            --number-sections
            --pdf-engine=pdflatex
            -V colorlinks=true

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: vault-export
          path: |
            output/vault_export.pdf
            combined.md
