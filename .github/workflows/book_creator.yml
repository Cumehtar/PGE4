name: Convert Vault to PDF (Production)

on:
  workflow_dispatch:

jobs:
  convert_via_pandoc:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Assemble Combined Markdown
        run: |
          mkdir -p output
          
          # 1. Initialize with Global Metadata
          if [ -f "metadata.yaml" ]; then
            cat metadata.yaml > combined.md
            echo -e "\n" >> combined.md
          else
            echo -e "---\ntitle: Documentation\n---\n" > combined.md
          fi

          # 2. Process Manifest line by line
          while IFS='|' read -r raw_filename header_str || [ -n "$raw_filename" ]; do
            
            # Remove Windows line endings and trim whitespace
            filename=$(echo "$raw_filename" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | tr -d '\r')
            
            if [ -n "$filename" ] && [ -f "$filename" ]; then
              echo "Processing: $filename"
              
              # Prepend the Chapter Header (e.g., # Introduction)
              echo -e "\n$header_str\n" >> combined.md
              
              # Generate unique ID for footnotes to prevent duplication
              FILE_ID=$(echo "$filename" | md5sum | cut -c1-5)
              
              # Handle Sidebar framing
              if [[ "$filename" == *"Sidebars"* ]]; then
                 echo -e "\n\begin{sidebarbox}" >> combined.md
              fi

              # CLEANING & APPENDING:
              # 1. perl: Nuke Obsidian YAML frontmatter block
              # 2. tr: Strip the problematic U+0008 (^^H) and other nasty control chars
              # 3. sed: Convert '---' into '***' to avoid YAML parse errors
              # 4. sed: Make footnote markers unique to this specific file
              perl -0777 -pe 's/^---\s*.*?\n---\s*\n//s' "$filename" | \
              tr -d '[:cntrl:]' | \
              sed "s/^---/***/" | \
              sed -r "s/\[\^([0-9]+)\]/[^\1-$FILE_ID]/g" >> combined.md
              
              if [[ "$filename" == *"Sidebars"* ]]; then
                 echo -e "\end{sidebarbox}\n" >> combined.md
              fi

              # Visual separator in Markdown for safety
              echo -e "\n" >> combined.md
            fi
          done < manifest.txt

          # 3. Strip Wikilinks
          sed -i 's/\[\[//g; s/\]\]//g' combined.md

      - name: Run Pandoc
        uses: docker://pandoc/extra:3.9
        with:
          args: >
            combined.md
            --output=output/vault_export.pdf
            --include-in-header=preamble.tex
            --toc
            --toc-depth=1
            --number-sections
            --pdf-engine=pdflatex
            -V colorlinks=true
            -V geometry:margin=1in

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: final-document
          path: |
            output/vault_export.pdf
            combined.md
