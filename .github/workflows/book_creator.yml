name: Simple Vault Export (Framed Boxes)

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Assemble and Clean Markdown
        run: |
          mkdir -p output
          
          if [ -f "metadata.yaml" ]; then
            cat metadata.yaml > combined.md
          else
            echo -e "---\ntitle: Documentation\n---\n" > combined.md
          fi

          while IFS='|' read -r raw_filename header_str || [ -n "$raw_filename" ]; do
            filename=$(echo "$raw_filename" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | tr -d '\r')
            
            if [ -n "$filename" ] && [ -f "$filename" ]; then
              echo -e "\n$header_str\n" >> combined.md
              
              FILE_ID=$(echo "$filename" | md5sum | cut -c1-5)

              # Cleaning pipeline
              # We use perl to strip control chars and frontmatter
              perl -pe 's/[\x00-\x08\x0B\x0C\x0E-\x1F]//g' "$filename" | \
              perl -0777 -pe 's/^---\s*.*?\n---\s*\n//s' | \
              sed "s/^---/***/" | \
              sed -r "s/\[\^([0-9]+)\]/[^\1-$FILE_ID]/g" >> combined.md
              
              # If the file ends, we ensure any open tcolorbox is closed
              echo -e "\n\subsubboxend\n" >> combined.md
            fi
          done < manifest.txt

          sed -i 's/\[\[//g; s/\]\]//g' combined.md

      - name: Run Pandoc
        uses: docker://pandoc/extra:3.9
        with:
          args: >
            combined.md
            --output=output/vault_export.pdf
            --include-in-header=preamble.tex
            --toc
            --toc-depth=1
            --pdf-engine=pdflatex
            -V colorlinks=true

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: vault-pdf
          path: output/vault_export.pdf
