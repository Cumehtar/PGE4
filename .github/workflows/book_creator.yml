name: Convert Vault to PDF (Advanced Layout)

on:
  workflow_dispatch:

jobs:
  convert_via_pandoc:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Assemble Combined Markdown
        run: |
          mkdir -p output
          
          # 1. Start with global metadata
          if [ -f "metadata.yaml" ]; then
            cat metadata.yaml > combined.md
            echo -e "\n" >> combined.md
          else
            echo -e "---\ntitle: Documentation\n---\n" > combined.md
          fi

          # 2. Process Manifest
          while IFS='|' read -r raw_filename header_str || [ -n "$raw_filename" ]; do
            
            filename=$(echo "$raw_filename" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | tr -d '\r')
            
            if [ -n "$filename" ] && [ -f "$filename" ]; then
              echo "Adding: $filename"
              
              # Add the header
              echo -e "\n$header_str\n" >> combined.md
              
              # LOGIC: If path contains "Sidebar", wrap in a LaTeX Frame
              if [[ "$filename" == *"Sidebar"* ]]; then
                 echo -e "\n\begin{cutoutbox}" >> combined.md
              fi

              # Strip frontmatter and append content
              perl -0777 -pe 's/^---\s*.*?\n---\s*\n//s' "$filename" | sed 's/^---/***/' >> combined.md
              
              if [[ "$filename" == *"Sidebar"* ]]; then
                 echo -e "\end{cutoutbox}\n" >> combined.md
              fi

              echo -e "\n" >> combined.md
            fi
          done < manifest.txt

          sed -i 's/\[\[//g; s/\]\]//g' combined.md

      - name: Run Pandoc
        uses: docker://pandoc/latex:3.8
        with:
          args: >
            combined.md
            --output=output/vault_export.pdf
            --include-in-header=preamble.tex
            --toc
            --toc-depth=1
            --number-sections
            --pdf-engine=pdflatex
            -V colorlinks=true
