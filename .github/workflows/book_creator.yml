name: Multi-Column Vault Export

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Assemble Markdown
        run: |
          mkdir -p output
          
          if [ -f "metadata.yaml" ]; then
            cat metadata.yaml > combined.md
          else
            echo -e "---\ntitle: Vault Documentation\n---\n" > combined.md
          fi

          while IFS='|' read -r raw_filename header_str || [ -n "$raw_filename" ]; do
            filename=$(echo "$raw_filename" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | tr -d '\r')
            
            if [ -n "$filename" ] && [ -f "$filename" ]; then
              echo -e "\n$header_str\n" >> combined.md
              
              FILE_ID=$(echo "$filename" | md5sum | cut -c1-5)
              
              # Strip YAML frontmatter and rename footnotes
              perl -0777 -pe 's/^---\s*.*?\n---\s*\n//s' "$filename" | \
              sed -r "s/\[\^([0-9]+)\]/[^\1-$FILE_ID]/g" >> combined.md
              
              echo -e "\n" >> combined.md
            fi
          done < manifest.txt

          # Cleanup wikilinks
          sed -i 's/\[\[//g; s/\]\]//g' combined.md

          # Ensure the document ends by closing any open multicols
          echo -e "\n\n\\end{multicols}\n" >> combined.md

      - name: Run Pandoc
        uses: docker://pandoc/extra:3.9
        with:
          args: >
            combined.md
            --output=output/vault_export.pdf
            --include-in-header=preamble.tex
            --toc
            --toc-depth=2
            --pdf-engine=pdflatex
            -V colorlinks=false
