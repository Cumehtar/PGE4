name: Convert Vault to PDF

on:
  workflow_dispatch:

jobs:
  convert_via_pandoc:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Assemble Combined Markdown
        run: |
          mkdir -p output
          
          # 1. Start the combined file with the global metadata
          if [ -f "metadata.yaml" ]; then
            cat metadata.yaml > combined.md
            echo -e "\n" >> combined.md
          else
            echo "---" > combined.md
            echo "title: Documentation" >> combined.md
            echo "---" >> combined.md
          fi

          # 2. Append each file from manifest with its header
          while IFS='|' read -r filename header_str || [ -n "$filename" ]; do
            # Clean filename
            filename=$(echo "$filename" | tr -d '\r' | xargs)
            
            if [ -n "$filename" ] && [ -f "$filename" ]; then
              echo "Adding: $filename"
              
              # Add the header from manifest
              echo -e "\n$header_str\n" >> combined.md
              
              # Append content while stripping original Obsidian frontmatter
              # This Perl command ensures no internal '---' blocks remain
              perl -0777 -pe 's/^---\s*.*?\n---\s*\n//s' "$filename" >> combined.md
              
              # Add spacing between files
              echo -e "\n" >> combined.md
            elif [ -n "$filename" ]; then
              echo "Warning: File '$filename' not found. Skipping."
            fi
          done < manifest.txt

          # 3. Final cleanup: Remove Wikilinks [[ ]] from the combined file
          sed -i 's/\[\[//g; s/\]\]//g' combined.md

      - name: Run Pandoc
        uses: docker://pandoc/latex:3.8
        with:
          args: >
            combined.md
            --output=output/vault_export.pdf
            --from markdown
            --toc
            --number-sections
            --pdf-engine=pdflatex
            -V colorlinks=true
            -V geometry:margin=1in

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: vault-export
          path: |
            output/vault_export.pdf
            combined.md
