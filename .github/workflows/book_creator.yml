name: Convert Vault to PDF

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  convert_via_pandoc:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Process Manifest and Inject Headers
        id: prepare
        run: |
          # Create clean directories
          mkdir -p build_dir
          mkdir -p output
          
          # Initialize a list to hold the paths for Pandoc
          touch file_list.txt

          # Read manifest line by line (format: filename|# Header)
          # IFS='|' ensures spaces in filenames don't break the split
          while IFS='|' read -r filename header_str || [ -n "$filename" ]; do
            # Remove Windows carriage returns if present
            filename=$(echo "$filename" | tr -d '\r')
            
            if [ -f "$filename" ]; then
              # Create a filesystem-safe name for the build directory
              safe_name=$(echo "$filename" | tr ' /' '__')
              
              # 1. Add the custom header from manifest to the new temp file
              echo "$header_str" > "build_dir/$safe_name"
              echo "" >> "build_dir/$safe_name"
              
              # 2. Append content while STRIPPING Obsidian frontmatter (--- ... ---)
              # This prevents the "did not find expected <document start>" error
              sed '1 { /^---/ { :a N; /\n---/! ba; d } }' "$filename" >> "build_dir/$safe_name"
              
              # 3. Strip Wikilinks [[ ]] to prevent LaTeX formatting issues
              sed -i 's/\[\[//g; s/\]\]//g' "build_dir/$safe_name"
              
              # 4. Record the path for the Pandoc container
              echo "/github/workspace/build_dir/$safe_name" >> file_list.txt
              echo "Processed: $filename"
            else
              echo "Warning: File '$filename' not found. Skipping."
            fi
          done < manifest.txt

          # Join all filenames into a single string wrapped in quotes
          FILES_STRING=$(sed 's/.*/"&"/' file_list.txt | tr '\n' ' ')
          echo "files=$FILES_STRING" >> $GITHUB_OUTPUT

      - name: Run Pandoc
        uses: docker://pandoc/latex:3.8
        with:
          args: >
            --from markdown
            --output=output/vault_export.pdf
            metadata.yaml
            ${{ steps.prepare.outputs.files }}
            --toc
            --number-sections
            --pdf-engine=pdflatex
            -V colorlinks=true
            -V geometry:margin=1in

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: converted-pdf
          path: output/vault_export.pdf
