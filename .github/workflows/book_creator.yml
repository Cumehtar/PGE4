name: Convert Vault to PDF

on:
  workflow_dispatch:

jobs:
  convert_via_pandoc:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Assemble Combined Markdown
        run: |
          mkdir -p output
          
          # 1. Start the combined file with global metadata
          if [ -f "metadata.yaml" ]; then
            cat metadata.yaml > combined.md
            echo -e "\n" >> combined.md
          else
            echo -e "---\ntitle: Documentation\n---\n" > combined.md
          fi

          # 2. Append each file from manifest
          while IFS='|' read -r raw_filename header_str || [ -n "$raw_filename" ]; do
            
            # Trim whitespace and CR safely
            filename=$(echo "$raw_filename" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | tr -d '\r')
            
            if [ -n "$filename" ] && [ -f "$filename" ]; then
              echo "Adding: $filename"
              
              # Add the header from manifest
              echo -e "\n$header_str\n" >> combined.md
              
              # Create a temporary version of the file for cleaning
              # Step A: Strip the actual YAML frontmatter block (top of file only)
              # Step B: Replace any remaining '---' at start of lines with '***' (Horizontal Rule alternative)
              # This stops Pandoc from thinking there is a second YAML block
              perl -0777 -pe 's/^---\s*.*?\n---\s*\n//s' "$filename" | \
              sed 's/^---/***/' >> combined.md
              
              # Add spacing
              echo -e "\n" >> combined.md
            elif [ -n "$filename" ]; then
              echo "Warning: File '$filename' not found. Skipping."
            fi
          done < manifest.txt

          # 3. Final cleanup: Remove Wikilinks [[ ]]
          sed -i 's/\[\[//g; s/\]\]//g' combined.md

      - name: Run Pandoc
        uses: docker://pandoc/latex:3.8
        with:
          args: >
            combined.md
            --output=output/vault_export.pdf
            --from markdown
            --toc
            --number-sections
            --pdf-engine=pdflatex
            -V colorlinks=true
            -V geometry:margin=1in

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: vault-export
          path: |
            output/vault_export.pdf
            combined.md
