      - name: Process Manifest and Inject Headers
        id: prepare
        run: |
          mkdir -p build_dir
          mkdir -p output
          touch file_list.txt

          while IFS='|' read -r filename header_str || [ -n "$filename" ]; do
            filename=$(echo "$filename" | tr -d '\r')
            
            if [ -f "$filename" ]; then
              safe_name=$(echo "$filename" | tr ' /' '__')
              
              # 1. Add the custom header from manifest
              echo "$header_str" > "build_dir/$safe_name"
              echo "" >> "build_dir/$safe_name"
              
              # 2. Append content while STRIPPING Obsidian YAML frontmatter
              # This sed command deletes everything between the first and second '---'
              sed '1 { /^---/ { :a N; /\n---/! ba; d } }' "$filename" >> "build_dir/$safe_name"
              
              # 3. Strip remaining Wikilinks [[ ]]
              sed -i 's/\[\[//g; s/\]\]//g' "build_dir/$safe_name"
              
              echo "/github/workspace/build_dir/$safe_name" >> file_list.txt
            fi
          done < manifest.txt

          FILES_STRING=$(sed 's/.*/"&"/' file_list.txt | tr '\n' ' ')
          echo "files=$FILES_STRING" >> $GITHUB_OUTPUT
