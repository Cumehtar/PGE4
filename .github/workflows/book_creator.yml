name: Convert Vault to PDF

on:
  workflow_dispatch:

jobs:
  convert_via_pandoc:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Process Manifest and Inject Headers
        id: prepare
        run: |
          mkdir -p build_dir
          mkdir -p output
          touch file_list.txt

          while IFS='|' read -r filename header_str || [ -n "$filename" ]; do
            # 1. Clean up the filename (remove Windows carriage returns)
            filename=$(echo "$filename" | tr -d '\r' | xargs)
            
            if [ -n "$filename" ] && [ -f "$filename" ]; then
              # Create a safe name for build_dir by flattening the path
              safe_name=$(echo "$filename" | tr ' /' '__')
              
              # 2. Prepend the header from manifest
              echo "$header_str" > "build_dir/$safe_name"
              echo "" >> "build_dir/$safe_name"
              
              # 3. Aggressively strip YAML frontmatter and append content
              # This Perl command deletes everything from the first --- to the second ---
              # only if it starts at the beginning of the file.
              perl -0777 -pe 's/^---\s*.*?\n---\s*\n//s' "$filename" >> "build_dir/$safe_name"
              
              # 4. Strip Wikilinks [[ ]]
              sed -i 's/\[\[//g; s/\]\]//g' "build_dir/$safe_name"
              
              # 5. Save the absolute path for the Docker container
              echo "/github/workspace/build_dir/$safe_name" >> file_list.txt
            elif [ -n "$filename" ]; then
              echo "Warning: File '$filename' not found. Skipping."
            fi
          done < manifest.txt

          # Convert list to space-separated quoted string
          FILES_STRING=$(sed 's/.*/"&"/' file_list.txt | tr '\n' ' ')
          echo "files=$FILES_STRING" >> $GITHUB_OUTPUT

      - name: Run Pandoc
        uses: docker://pandoc/latex:3.8
        with:
          args: >
            --from markdown
            --output=output/vault_export.pdf
            metadata.yaml
            ${{ steps.prepare.outputs.files }}
            --toc
            --number-sections
            --pdf-engine=pdflatex
            -V colorlinks=true
            -V geometry:margin=1in

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: converted-pdf
          path: output/vault_export.pdf
