name: Convert Vault to PDF

on:
  workflow_dispatch:

jobs:
  convert_via_pandoc:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Assemble Combined Markdown
        run: |
          mkdir -p output
          
          # 1. Global Metadata setup
          if [ -f "metadata.yaml" ]; then
            cat metadata.yaml > combined.md
            echo -e "\n" >> combined.md
          else
            echo -e "---\ntitle: Documentation\n---\n" > combined.md
          fi

          # 2. Process Manifest line by line
          while IFS='|' read -r raw_filename header_str || [ -n "$raw_filename" ]; do
            
            # Clean filename strings
            filename=$(echo "$raw_filename" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | tr -d '\r')
            
            if [ -n "$filename" ] && [ -f "$filename" ]; then
              echo "Processing: $filename"
              
              # Prepend the Chapter/Section Header
              echo -e "\n$header_str\n" >> combined.md
              
              # Unique Footnote ID generation (prevents collisions)
              FILE_ID=$(echo "$filename" | md5sum | cut -c1-5)
              
              # LOGIC: Wrap files from the Sidebars folder in a frame
              if [[ "$filename" == *"Sidebars"* ]]; then
                 echo -e "\n\begin{sidebarbox}" >> combined.md
              fi

              # Clean content: strip frontmatter, swap --- for ***, and uniquify footnotes
              perl -0777 -pe 's/^---\s*.*?\n---\s*\n//s' "$filename" | \
              sed "s/^---/***/" | \
              sed -r "s/\[\^([0-9]+)\]/[^\1-$FILE_ID]/g" >> combined.md
              
              if [[ "$filename" == *"Sidebars"* ]]; then
                 echo -e "\end{sidebarbox}\n" >> combined.md
              fi

              echo -e "\n" >> combined.md
            fi
          done < manifest.txt

          # 3. Strip Wikilinks [[ ]]
          sed -i 's/\[\[//g; s/\]\]//g' combined.md

      - name: Run Pandoc
        uses: docker://pandoc/latex:3.8-full
        with:
          args: >
            combined.md
            --output=output/vault_export.pdf
            --include-in-header=preamble.tex
            --toc
            --toc-depth=1
            --number-sections
            --pdf-engine=pdflatex
            -V colorlinks=true

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: final-pdf-package
          path: |
            output/vault_export.pdf
            combined.md
