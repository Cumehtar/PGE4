name: Export Guidebook

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Assemble Document
        run: |
          # 1. Initialize combined document 
          > combined.md
          
          # 2. Process the manifest and avoid footnote collisions
          while IFS='|' read -r f h || [ -n "$f" ]; do
            # Trim whitespace and Windows carriage returns safely
            fname=$(echo "$f" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | tr -d '\r')
            
            if [ -n "$fname" ] && [ -f "$fname" ]; then
              echo "Processing: $fname"
              
              # Create a unique prefix from filename to prevent duplicate footnote errors
              # This turns [^1] into [^Filename1]
              fprefix=$(echo "$fname" | tr -dc 'a-zA-Z0-9')
              
              # Append the header level from manifest (e.g., #, ##)
              echo -e "\n$h\n" >> combined.md
              
              # Process the file: 
              # - Strip YAML frontmatter
              # - Prefix every footnote reference and definition
              sed '1{/^---$/{:a;n;/^---$/!ba;d}}' "$fname" | \
              sed "s/\[\^/\[\^${fprefix}-/g" >> combined.md
              
              echo -e "\n" >> combined.md
            else
              [ -n "$fname" ] && echo "Warning: File not found -> $fname"
            fi
          done < manifest.txt

          # 3. Convert Obsidian links to Index tags
          # This replaces [[Term]] with Term\index{Term}
          sed -i 's/\[\[\([^]]*\)\]\]/\1\\index{\1}/g' combined.md

          # 4. Clean up Obsidian-specific syntax (Remove [[ ]])
          sed -i 's/\[\[//g; s/\]\]//g' combined.md

      - name: Run Pandoc
        uses: docker://pandoc/extra:3.9
        with:
          args: >
            combined.md
            -f markdown-smart
            -o vault_export.pdf
            --include-in-header=preamble.tex
            --include-before-body=front.tex
            --include-after-body=postamble.tex
            -V makeindex=true
            --pdf-engine=lualatex
            --pdf-engine-opt=-shell-escape
            --resource-path=.:"docs/PGE Texts/Art/"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: export-files
          path: |
            vault_export.pdf
            combined.md
