name: Convert Vault to PDF

on:
  workflow_dispatch:

jobs:
  convert_via_pandoc:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Assemble Combined Markdown
        run: |
          mkdir -p output
          
          # 1. Initialize with Global Metadata
          if [ -f "metadata.yaml" ]; then
            cat metadata.yaml > combined.md
            echo -e "\n" >> combined.md
          else
            echo -e "---\ntitle: Documentation\n---\n" > combined.md
          fi

          # 2. Process Manifest line by line
          # Using IFS='|' to handle filenames with spaces and single quotes safely
          while IFS='|' read -r raw_filename header_str || [ -n "$raw_filename" ]; do
            
            # Clean filename strings and remove Windows carriage returns
            filename=$(echo "$raw_filename" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | tr -d '\r')
            
            if [ -n "$filename" ] && [ -f "$filename" ]; then
              echo "Processing: $filename"
              
              # Prepend the Chapter/Section Header from manifest
              echo -e "\n$header_str\n" >> combined.md
              
              # Generate unique ID for footnotes to prevent duplication across files
              FILE_ID=$(echo "$filename" | md5sum | cut -c1-5)
              
              # Start Sidebar Frame if folder/path matches "Sidebars"
              if [[ "$filename" == *"Sidebars"* ]]; then
                 echo -e "\n\begin{sidebarbox}" >> combined.md
              fi

              # CLEANING & APPENDING PIPELINE:
              # A. iconv: Force UTF-8 and drop invalid bytes (-c)
              # B. perl: Nuke the YAML frontmatter block at the top of the file
              # C. sed 1: Scrub all non-printable control characters (including U+0008 / ^^H)
              # D. sed 2: Swap '---' to '***' so Pandoc doesn't see a second YAML block
              # E. sed 3: Append the unique FILE_ID to every footnote reference
              iconv -f utf-8 -t utf-8 -c "$filename" | \
              perl -0777 -pe 's/^---\s*.*?\n---\s*\n//s' | \
              sed 's/[\x00-\x08\x0B\x0C\x0E-\x1F]//g' | \
              sed "s/^---/***/" | \
              sed -r "s/\[\^([0-9]+)\]/[^\1-$FILE_ID]/g" >> combined.md
              
              # Close Sidebar Frame if necessary
              if [[ "$filename" == *"Sidebars"* ]]; then
                 echo -e "\end{sidebarbox}\n" >> combined.md
              fi

              # Safety newline between files
              echo -e "\n" >> combined.md
            fi
          done < manifest.txt

          # 3. Final cleanup: Remove Obsidian Wikilinks [[ ]]
          sed -i 's/\[\[//g; s/\]\]//g' combined.md

      - name: Run Pandoc
        # Using the extra:3.9 image for maximum LaTeX package compatibility
        uses: docker://pandoc/extra:3.9
        with:
          args: >
            combined.md
            --output=output/vault_export.pdf
            --include-in-header=preamble.tex
            --toc
            --toc-depth=1
            --number-sections
            --pdf-engine=pdflatex
            -V colorlinks=true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vault-pdf-package
          path: |
            output/vault_export.pdf
            combined.md
