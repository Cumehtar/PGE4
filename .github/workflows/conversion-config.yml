# ──────────────────────────────────────────────────────────────────────────────
# conversion-config.yml  —  .github/workflows/conversion-config.yml
# ──────────────────────────────────────────────────────────────────────────────

output: my-travel-guide

defaults:
  engine:      pdflatex
  font_size:   12pt
  margin:      2.5cm          # overridden by the template's own geometry
  font_main:   lmodern
  template:    .github/templates/travelguide.tex
  table_of_contents: true
  title:       "My Travel Guide"
  author:      "Your Name"
  date:        "\\today"
  # --top-level-division=chapter maps  #  → \chapter  (required by the template)
  # Without this, # becomes \section and the big chapter title style won't fire.
  pandoc_args:
    - "--top-level-division=chapter"

# ── Per-type LaTeX wrappers ────────────────────────────────────────────────────
type_styles:

  introduction:
    before: |
      \chapter*{Introduction}
      \addcontentsline{toc}{chapter}{Introduction}
    after: ""

  chapter:
    before: ""    # \chapter{} comes from the # heading in the .md file itself
    after:  ""

  subchapter:
    before: ""    # \section{} comes from ## headings in the .md file
    after:  ""

  insert:
    before: |
      \begin{insertbox}
    after: |
      \end{insertbox}
      \vspace{6pt}

# ── Files — assembled and converted in this order ──────────────────────────────
files:
  - src:  'docs/PGE Texts/Sidebars/Editorial Foreword.md'
    type: introduction

  - src:  docs/chapter-1.md
    type: chapter

  - src:  docs/chapter-1-sub.md
    type: subchapter

  - src:  docs/insert-tip.md
    type: insert

  - src:  docs/chapter-2.md
    type: chapter

  - src:  docs/chapter-2-sub-a.md
    type: subchapter

  - src:  docs/insert-warning.md
    type: insert
